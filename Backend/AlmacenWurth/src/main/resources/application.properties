spring.application.name=AlmacenWurth
spring.datasource.url=jdbc:mysql://localhost:3306/almacen_wurth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
app.upload.dir=uploads/embarques
app.upload.temp-dir=uploads/embarques/temp

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB